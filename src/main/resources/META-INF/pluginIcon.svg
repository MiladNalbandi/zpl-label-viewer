<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3A8DFF"/>
            <stop offset="100%" stop-color="#000000"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
        </filter>
    </defs>
    <!-- Modern background with rounded corners and subtle drop shadow -->
    <rect x="0" y="0" width="128" height="128" rx="24" ry="24" fill="url(#bgGradient)" filter="url(#shadow)"/>
    <!-- Centered modern text -->
    <text x="50%" y="50%" fill="#FFF" font-size="32" font-family="Roboto, sans-serif" font-weight="700" text-anchor="middle" dominant-baseline="central">
        ZPL
    </text>
</svg>
